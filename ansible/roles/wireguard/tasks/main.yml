---
# =============================================================================
# roles/wireguard/tasks/main.yml
# Configures WireGuard for admin-only management access (ADR-004).
# Generates the server keypair on the host (private key never leaves the
# server) and configures the operator's public key as the only peer.
#
# Operator public key is set in ansible/vars/main.yml → wireguard_peer_pubkey.
# Generate your laptop keypair with:
#   wg genkey | tee ~/wg-private.key | wg pubkey > ~/wg-public.key
#
# After Ansible runs, the host's public key is printed as a debug message.
# Copy it into your laptop's WireGuard peer config.
#
# Author: Christopher Shaiman
# License: Apache 2.0
# =============================================================================

- name: Ensure WireGuard is installed
  ansible.builtin.apt:
    name: wireguard
    state: present
    update_cache: false

# Generate host keypair if it doesn't exist. The private key never leaves
# the server — no Secrets Manager, no control node, no transit.
- name: Check for existing WireGuard private key
  ansible.builtin.stat:
    path: /etc/wireguard/private.key
  register: wg_privkey_stat

- name: Generate WireGuard keypair
  when: not wg_privkey_stat.stat.exists
  block:
    - name: Generate private key
      ansible.builtin.shell: wg genkey
      register: wg_genkey
      changed_when: true
      no_log: true

    - name: Write private key
      ansible.builtin.copy:
        content: "{{ wg_genkey.stdout }}"
        dest: /etc/wireguard/private.key
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Derive and write public key
      ansible.builtin.shell: cat /etc/wireguard/private.key | wg pubkey
      register: wg_pubkey_new
      changed_when: false
      no_log: true

    - name: Write public key
      ansible.builtin.copy:
        content: "{{ wg_pubkey_new.stdout }}"
        dest: /etc/wireguard/public.key
        owner: root
        group: root
        mode: "0644"

# Read existing keys for use in the template
- name: Read private key
  ansible.builtin.slurp:
    src: /etc/wireguard/private.key
  register: wg_privkey_slurp
  no_log: true

- name: Read public key
  ansible.builtin.slurp:
    src: /etc/wireguard/public.key
  register: wg_pubkey_slurp

- name: Write wg0.conf
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"
  vars:
    wireguard_private_key: "{{ wg_privkey_slurp.content | b64decode | trim }}"
  no_log: true
  notify: Restart WireGuard

- name: Enable and start wg-quick@wg0
  ansible.builtin.systemd:
    name: wg-quick@wg0
    state: started
    enabled: true
    daemon_reload: true

- name: Verify wg0 interface is up
  ansible.builtin.command: wg show wg0
  register: wg_status
  changed_when: false
  failed_when: wg_status.rc != 0

# Print the host's public key so the operator can configure their laptop
- name: Display host WireGuard public key
  ansible.builtin.debug:
    msg: >-
      HOST PUBLIC KEY (copy to your laptop's WireGuard peer config):
      {{ wg_pubkey_slurp.content | b64decode | trim }}
