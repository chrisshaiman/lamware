---
# =============================================================================
# roles/wireguard/tasks/main.yml
# Configures WireGuard for admin-only management access (ADR-004).
# Pulls private key and peer public key from AWS Secrets Manager on the
# Ansible control node, then writes the config to the remote host.
#
# Secret format (secret_arn_wireguard):
#   {
#     "private_key": "<server WireGuard private key>",
#     "peer_public_key": "<operator laptop WireGuard public key>"
#   }
#
# To generate keys for first-time setup:
#   wg genkey | tee server_private.key | wg pubkey > server_public.key
#   wg genkey | tee client_private.key | wg pubkey > client_public.key
# Store server_private.key and client_public.key in secret_arn_wireguard.
# The client config uses client_private.key and server_public.key.
#
# Author: Christopher Shaiman
# License: Apache 2.0
# =============================================================================

- name: Ensure WireGuard is installed
  ansible.builtin.apt:
    name: wireguard
    state: present
    update_cache: false

# Pull keys from Secrets Manager on the control node (operator's machine)
# so the secret never touches the Ansible controller's environment variables
# and is not logged unless no_log is bypassed.
- name: Fetch WireGuard keys from Secrets Manager
  ansible.builtin.command: >
    aws secretsmanager get-secret-value
    --secret-id {{ secret_arn_wireguard }}
    --query SecretString
    --output text
    --region {{ secrets_manager_region }}
  delegate_to: localhost
  register: wireguard_secret_raw
  changed_when: false
  no_log: true

- name: Parse WireGuard secret JSON
  ansible.builtin.set_fact:
    wireguard_secret: "{{ wireguard_secret_raw.stdout | from_json }}"
  no_log: true

- name: Write wg0.conf
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"  # WireGuard refuses to start if config is world-readable
  vars:
    wireguard_private_key: "{{ wireguard_secret.private_key }}"
    wireguard_peer_pubkey: "{{ wireguard_secret.peer_public_key }}"
  no_log: true
  notify: Restart WireGuard

- name: Enable and start wg-quick@wg0
  ansible.builtin.systemd:
    name: wg-quick@wg0
    state: started
    enabled: true
    daemon_reload: true

- name: Verify wg0 interface is up
  ansible.builtin.command: wg show wg0
  register: wg_status
  changed_when: false
  failed_when: wg_status.rc != 0
