---
# =============================================================================
# roles/kvm/tasks/main.yml
# Ensures KVM/QEMU/libvirt are installed and configured for Cape sandbox use.
# Packer already installed the packages; this role ensures services are
# enabled, the cape user has the right group memberships, and hugepages
# are configured for stable VM memory allocation.
#
# Author: Christopher Shaiman
# License: Apache 2.0
# =============================================================================

# Packer installs these packages, but ensure idempotency in case this role
# is ever run against a freshly provisioned host without a Packer image.
- name: Ensure KVM and libvirt packages are present
  ansible.builtin.apt:
    name:
      - qemu-kvm
      - libvirt-daemon-system
      - libvirt-clients
      - virtinst
      - cpu-checker
      - libguestfs-tools
      - bridge-utils
    state: present
    update_cache: false

- name: Enable and start libvirtd
  ansible.builtin.systemd:
    name: libvirtd
    state: started
    enabled: true

# Cape runs its analysis VMs as the cape user. The cape user must be in
# the libvirt and kvm groups to interact with the hypervisor without sudo.
- name: Add cape user to libvirt and kvm groups
  ansible.builtin.user:
    name: "{{ cape_user }}"
    groups: libvirt,kvm
    append: true

# Hugepages pre-allocate memory for KVM guests, reducing latency from
# page faults during analysis and preventing the host from swapping VM
# memory under load. Count set via kvm_hugepages_2mb (defaults/main.yml).
- name: Configure hugepages in GRUB
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX='
    line: 'GRUB_CMDLINE_LINUX="hugepages={{ kvm_hugepages_2mb }} default_hugepagesz=2M hugepagesz=2M"'
    backup: true
  notify: Update GRUB

- name: Set hugepages at runtime (takes effect without reboot)
  ansible.posix.sysctl:
    name: vm.nr_hugepages
    value: "{{ kvm_hugepages_2mb }}"
    state: present
    sysctl_file: /etc/sysctl.d/90-hugepages.conf
    reload: true

# Disable the default virbr0 NAT network — analysis VMs must not have
# an uncontrolled internet path. The networking role creates the air-gapped
# detonation network instead.
- name: Check if default libvirt network is active
  ansible.builtin.command: virsh net-info default
  register: virsh_default_info
  changed_when: false
  failed_when: false

- name: Destroy default libvirt network if active
  ansible.builtin.command: virsh net-destroy default
  when: >
    virsh_default_info.rc == 0 and
    'Active:         yes' in virsh_default_info.stdout

- name: Undefine default libvirt network
  ansible.builtin.command: virsh net-undefine default
  when: virsh_default_info.rc == 0
  failed_when: false
