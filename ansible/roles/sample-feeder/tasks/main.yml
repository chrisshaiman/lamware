---
# =============================================================================
# roles/sample-feeder/tasks/main.yml
# Deploys the MalwareBazaar sample feeder CLI tool.
#
# The feeder is an interactive CLI tool — not a daemon. The operator SSHs
# in via WireGuard and runs it manually with filters to review and submit
# samples to Cape.
#
# Author: Christopher Shaiman
# License: Apache 2.0
# =============================================================================

- name: Create sample-feeder install directory
  ansible.builtin.file:
    path: "{{ sample_feeder_dir }}"
    state: directory
    owner: "{{ sample_feeder_user }}"
    group: "{{ sample_feeder_user }}"
    mode: "0750"

- name: Install pyzipper for AES-encrypted MalwareBazaar zips
  ansible.builtin.pip:
    name: pyzipper
    state: present
    break_system_packages: true

- name: Fix pip package permissions for cape user
  ansible.builtin.shell: chmod -R a+rX /usr/local/lib/python3.12/dist-packages/
  args:
    executable: /bin/bash
  changed_when: false

# -------------------------------------------------------------------------
# Deploy CLI tool and config
# -------------------------------------------------------------------------

- name: Deploy sample_feeder.py
  ansible.builtin.template:
    src: sample_feeder.py.j2
    dest: "{{ sample_feeder_dir }}/sample_feeder.py"
    owner: "{{ sample_feeder_user }}"
    group: "{{ sample_feeder_user }}"
    mode: "0750"

- name: Write sample-feeder config
  ansible.builtin.template:
    src: sample-feeder.conf.j2
    dest: "{{ sample_feeder_dir }}/config.json"
    owner: "{{ sample_feeder_user }}"
    group: "{{ sample_feeder_user }}"
    mode: "0600"
  no_log: true

- name: Create convenience symlink
  ansible.builtin.file:
    src: "{{ sample_feeder_dir }}/sample_feeder.py"
    dest: /usr/local/bin/sample-feeder
    state: link
