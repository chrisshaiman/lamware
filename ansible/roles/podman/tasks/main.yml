---
# =============================================================================
# roles/podman/tasks/main.yml
# Installs Podman (rootless, daemonless container runtime) for running
# analysis tool stages in isolated containers.
#
# The konstruktoid hardening role disables several features that rootless
# Podman needs. This role re-enables them in a targeted way:
#   - user.max_user_namespaces (disabled by hardening)
#   - libsubid.so permissions (restricted to 644 by hardening)
#   - vfs storage driver (overlay fails with hardened mount options)
#
# Author: Christopher Shaiman
# License: Apache 2.0
# =============================================================================

- name: Install Podman
  ansible.builtin.apt:
    name:
      - podman
      - uidmap
      - slirp4netns
    state: present
    update_cache: true

- name: Ensure cape user has subuid/subgid ranges for rootless Podman
  ansible.builtin.lineinfile:
    path: "{{ item.file }}"
    line: "{{ cape_user }}:100000:65536"
    create: true
    mode: "0644"
  loop:
    - { file: /etc/subuid }
    - { file: /etc/subgid }

# konstruktoid hardening disables unprivileged user namespaces.
# Podman needs them for rootless container operation.
- name: Enable unprivileged user namespaces for rootless Podman
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-podman.conf
    reload: true
  loop:
    - { key: user.max_user_namespaces, value: "15000" }
    - { key: kernel.unprivileged_userns_clone, value: "1" }

# Ubuntu 24.04 ships restrictive AppArmor profiles for podman and crun
# that block shared library loading. Disable them — container isolation
# is provided by our own --cap-drop=ALL, --network=none, --read-only flags.
- name: Disable AppArmor profiles for podman and crun
  ansible.builtin.command: aa-disable {{ item }}
  loop:
    - podman
    - crun
  changed_when: true
  failed_when: false

# konstruktoid hardening strips execute bit from all shared libraries (644).
# Podman's toolchain (podman, crun, slirp4netns, conmon) and their transitive
# dependencies all need executable .so files. Rather than chasing each library
# individually, fix all .so files that podman's toolchain needs by resolving
# the full dependency tree.
- name: Fix shared library permissions for Podman toolchain
  ansible.builtin.shell: |
    for bin in /usr/bin/podman /usr/bin/crun /usr/bin/slirp4netns /usr/bin/conmon; do
      [ -f "$bin" ] || continue
      ldd "$bin" 2>/dev/null | grep -oP '=> \K/\S+' | while read lib; do
        reallib=$(realpath "$lib" 2>/dev/null)
        [ -f "$reallib" ] && chmod 755 "$reallib"
      done
    done
    ldconfig
  args:
    executable: /bin/bash
  changed_when: true

# overlay storage driver fails with hardened mount options on /home.
# vfs is slower but works without special mount permissions.
- name: Ensure containers config directory exists
  ansible.builtin.file:
    path: "/home/{{ cape_user }}/.config/containers"
    state: directory
    owner: "{{ cape_user }}"
    group: "{{ cape_user }}"
    mode: "0755"

# overlay storage driver fails with hardened mount options on /home.
# vfs is slower but works without special mount permissions.
- name: Configure Podman to use vfs storage driver
  ansible.builtin.copy:
    content: |
      [storage]
      driver = "vfs"
    dest: "/home/{{ cape_user }}/.config/containers/storage.conf"
    owner: "{{ cape_user }}"
    group: "{{ cape_user }}"
    mode: "0644"

- name: Clean stale overlay storage (switch to vfs)
  ansible.builtin.file:
    path: "/home/{{ cape_user }}/.local/share/containers/storage"
    state: absent

- name: Verify Podman works for cape user
  ansible.builtin.shell: |
    podman version --format {% raw %}'{{.Client.Version}}'{% endraw %}
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ cape_user }}"
  changed_when: false
  register: podman_verify
  failed_when: podman_verify.rc != 0
