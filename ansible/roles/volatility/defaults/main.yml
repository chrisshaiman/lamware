---
# roles/volatility/defaults/main.yml

# Volatility 3 install directory on the host
volatility_install_dir: /opt/volatility3
volatility_output_dir: /opt/volatility3/output
volatility_symbols_dir: /opt/volatility3/symbols

# Volatility 3 version (PyPI)
volatility_version: "2.8.0"

# Container resource limits — memory dumps are large (2-4 GB),
# Volatility needs significant RAM to parse them
volatility_container_memory: "8g"
volatility_container_cpus: "2"
volatility_container_timeout: "600"

# Windows ISF symbol table URL — must match the guest OS version
# Win11 26100 symbols from Microsoft Symbol Server
volatility_isf_url: "https://downloads.volatilityfoundation.org/volatility3/symbols/windows.zip"
