---
# =============================================================================
# roles/cape/tasks/main.yml
# Installs and configures CAPEv2 on the bare metal sandbox host.
#
# DSDT anti-evasion:
#   kvm-qemu.sh patches ACPI DSDT tables with host-specific hex values to
#   defeat sandbox evasion by malware that fingerprints ACPI/SMBIOS firmware.
#   The DSDT is captured directly from the host's firmware at build time —
#   no external storage needed since this runs on bare metal.
#
# Execution order:
#   1. Capture DSDT from host firmware + fetch API key from Secrets Manager
#   2. Create cape system user
#   3. Run kvm-qemu.sh with DSDT value substituted (builds patched QEMU)
#   4. Run cape2.sh (installs Cape services)
#   5. Configure resultserver IP, API binding, reporting
#   6. Enable systemd services
#
# Idempotency: kvm-qemu.sh and cape2.sh are guarded by stamp files so they
# don't re-run on every Ansible pass. Config changes (lineinfile/ini_file)
# are always idempotent.
#
# Author: Christopher Shaiman
# License: Apache 2.0
# =============================================================================

# -------------------------------------------------------------------------
# Cape API key — from Secrets Manager
# -------------------------------------------------------------------------

- name: Fetch Cape API key from Secrets Manager
  ansible.builtin.command: >
    aws secretsmanager get-secret-value
    --secret-id {{ secret_arn_cape }}
    --query SecretString
    --output text
    --region {{ secrets_manager_region }}
  delegate_to: localhost
  become: false
  register: cape_secret_raw
  changed_when: false
  failed_when: cape_secret_raw.rc != 0 or cape_secret_raw.stdout | length == 0
  no_log: true

- name: Parse Cape secret JSON
  ansible.builtin.set_fact:
    cape_secret: "{{ cape_secret_raw.stdout | from_json }}"
  no_log: true

# -------------------------------------------------------------------------
# Cape user
# -------------------------------------------------------------------------

- name: Ensure libvirt and kvm groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop:
    - libvirt
    - kvm

- name: Create cape system user
  ansible.builtin.user:
    name: "{{ cape_user }}"
    system: true
    shell: /bin/bash
    home: /home/{{ cape_user }}
    create_home: true
    groups: libvirt,kvm
    append: true

- name: Install git
  ansible.builtin.apt:
    name: git
    state: present

- name: Create CAPEv2 install directory
  ansible.builtin.file:
    path: "{{ cape_install_dir }}"
    state: directory
    owner: "{{ cape_user }}"
    group: "{{ cape_user }}"
    mode: "0755"

- name: Clone CAPEv2 repository
  ansible.builtin.git:
    repo: https://github.com/kevoreilly/CAPEv2.git
    dest: "{{ cape_install_dir }}"
    # Pinned 2026-04-19. force: true needed because cape2.sh modifies repo files.
    version: aa66fbd329052408a9599cf954a5cf72d8b1d61d
    depth: 1
    force: true
  become: true
  become_user: "{{ cape_user }}"

- name: Ensure cape owns its install directory
  ansible.builtin.file:
    path: "{{ cape_install_dir }}"
    owner: "{{ cape_user }}"
    group: "{{ cape_user }}"
    recurse: true

# -------------------------------------------------------------------------
# kvm-qemu.sh — builds DSDT-patched QEMU binary (slow; runs once)
# The script has a <WOOT> placeholder for the DSDT hex string.
# A stamp file prevents re-running after a successful build.
# -------------------------------------------------------------------------

- name: Check if kvm-qemu.sh has already run
  ansible.builtin.stat:
    path: /opt/.cape-kvm-qemu-installed
  register: cape_kvm_qemu_stamp

- name: Write kvm-config.sh with hardware-specific brand names
  ansible.builtin.copy:
    content: |
      # kvm-config.sh — sourced by kvm-qemu.sh to replace QEMU identifiers
      # with real hardware brand names from this host.
      # Values from: dmidecode -s system-manufacturer / bios-vendor
      PEN_REPLACER='{{ cape_hw_brand | default("GIGABYTE") }}'
      SCSI_REPLACER='{{ cape_hw_brand | default("GIGABYTE") }}'
      ATAPI_REPLACER='{{ cape_hw_brand | default("GIGABYTE") }}'
      MICRODRIVE_REPLACER='{{ cape_hw_brand | default("GIGABYTE") }}'
      BOCHS_BLOCK_REPLACER='{{ cape_hw_brand | default("GIGABYTE") }}'
      BOCHS_BLOCK_REPLACER2='{{ cape_hw_brand | default("GIGABYTE") }}'
      BOCHS_BLOCK_REPLACER3='{{ cape_hw_brand | default("GIGABYTE") }}'
      BXPC_REPLACER='{{ cape_hw_bios_vendor | default("GIGABYTE") }}'
      BOCHS_SEABIOS_BLOCK_REPLACER='{{ cape_hw_bios_vendor | default("GIGABYTE") }}'
    dest: "{{ cape_install_dir }}/installer/kvm-config.sh"
    owner: "{{ cape_user }}"
    group: "{{ cape_user }}"
    mode: "0755"
  when: not cape_kvm_qemu_stamp.stat.exists

- name: Build patched QEMU with /tmp exec (restored on failure)
  when: not cape_kvm_qemu_stamp.stat.exists
  block:
    - name: Temporarily allow exec on /tmp (needed for QEMU/libvirt build)
      ansible.builtin.command: mount -o remount,exec /tmp
      changed_when: true

    - name: Run kvm-qemu.sh (builds patched QEMU — may take 30-60 min)
      ansible.builtin.shell: |
        set -e
        cd {{ cape_install_dir }}/installer
        bash kvm-qemu.sh all {{ cape_user }}
        touch /opt/.cape-kvm-qemu-installed
      args:
        executable: /bin/bash
      changed_when: true
  always:
    - name: Restore noexec on /tmp
      ansible.builtin.command: mount -o remount,noexec /tmp
      changed_when: true

# -------------------------------------------------------------------------
# Restore libvirt packages — kvm-qemu.sh and cape2.sh remove/replace system
# QEMU and libvirt packages. Reinstall what we need for virsh and libvirtd.
# -------------------------------------------------------------------------

- name: Remove broken apt repos added by Cape installer
  ansible.builtin.shell: rm -f /etc/apt/sources.list.d/mongodb*.list /etc/apt/sources.list.d/tor*.list /etc/apt/sources.list.d/pgdg*.list
  args:
    executable: /bin/bash
  changed_when: false

- name: Add MongoDB GPG key
  ansible.builtin.shell: set -o pipefail && curl -fsSL https://www.mongodb.org/static/pgp/server-8.0.asc | gpg --dearmor -o /usr/share/keyrings/mongodb-server-8.0.gpg
  args:
    executable: /bin/bash
    creates: /usr/share/keyrings/mongodb-server-8.0.gpg

- name: Add MongoDB 8.0 repository
  ansible.builtin.copy:
    content: "deb [signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg] https://repo.mongodb.org/apt/ubuntu noble/mongodb-org/8.0 multiverse\n"
    dest: /etc/apt/sources.list.d/mongodb-org-8.0.list
    mode: "0644"

- name: Install MongoDB
  ansible.builtin.apt:
    name: mongodb-org
    state: present
    update_cache: true

- name: Enable and start MongoDB
  ansible.builtin.systemd:
    name: mongod
    state: started
    enabled: true

- name: Remove stale Cape libvirt libraries from /usr/local
  ansible.builtin.shell: rm -f /usr/local/lib/x86_64-linux-gnu/libvirt* && ldconfig
  args:
    executable: /bin/bash
  changed_when: false

- name: Reinstall libvirt and QEMU ROM packages after Cape installer
  ansible.builtin.apt:
    name:
      - libvirt-daemon-system
      - libvirt-clients
      - libvirt-dev
      - qemu-utils
      - qemu-system-data
      - seabios
      - ipxe-qemu
    state: present
    update_cache: true

- name: Fix QEMU data directory permissions (Cape installer sets 700)
  ansible.builtin.file:
    path: /usr/share/qemu
    mode: "0755"

- name: Symlink seabios VGA ROM to QEMU data directory
  ansible.builtin.file:
    src: /usr/share/seabios/vgabios-stdvga.bin
    dest: /usr/share/qemu/vgabios-stdvga.bin
    state: link

- name: Symlink iPXE e1000 EFI ROM to QEMU data directory
  ansible.builtin.file:
    src: /usr/lib/ipxe/qemu/efi-e1000.rom
    dest: /usr/share/qemu/efi-e1000.rom
    state: link

- name: Install patched QEMU binary (after apt reinstall to avoid overwrite)
  ansible.builtin.copy:
    src: /tmp/qemu-9.2.2_builded/usr/bin/qemu-system-x86_64
    dest: /usr/bin/qemu-system-x86_64
    mode: "0755"
    remote_src: true

- name: Fix swtpm state directory ownership
  ansible.builtin.file:
    path: /var/lib/swtpm-localca
    owner: tss
    group: tss
    mode: "0755"

- name: Fix libvirt directory permissions (cape installer sets 700)
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0755"
  loop:
    - /var/lib/libvirt
    - /var/lib/libvirt/images

- name: Ensure libvirtd is running after reinstall
  ansible.builtin.systemd:
    name: libvirtd
    state: started
    enabled: true
    daemon_reload: true

# -------------------------------------------------------------------------
# cape2.sh — installs Cape services (runs once)
# -------------------------------------------------------------------------

- name: Check if cape2.sh has already run
  ansible.builtin.stat:
    path: /etc/systemd/system/cape.service
  register: cape_service_file

- name: Run cape2.sh (installs Cape systemd services)
  ansible.builtin.shell: |
    cd {{ cape_install_dir }}/installer
    bash cape2.sh base {{ cape_user }}
  args:
    executable: /bin/bash
  when: not cape_service_file.stat.exists
  changed_when: true

- name: Fix Cape poetry directory permissions (cape2.sh sets 700)
  ansible.builtin.file:
    path: /etc/poetry
    mode: "0755"
    recurse: true

- name: Install Cape Python dependencies as cape user
  ansible.builtin.shell: |
    cd {{ cape_install_dir }}
    /etc/poetry/bin/poetry install --no-root
    /etc/poetry/bin/poetry run pip install libvirt-python
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ cape_user }}"
  changed_when: true

# -------------------------------------------------------------------------
# Cape configuration — always applied (idempotent ini_file edits)
# Stop services before editing config so they don't run with stale settings.
# cape2.sh may auto-start services; explicit stop ensures config is applied
# before the services come back up.
# -------------------------------------------------------------------------

- name: Stop Cape services before configuration
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - cape
    - cape-web
    - cape-processor
  failed_when: false  # services may not exist yet on first run
  when: cape_service_file.stat.exists

# Resultserver must listen on the detonation bridge gateway so VMs can
# reach it. VMs have no route to eth0 or wg0.
# Cape reads resultserver config from cuckoo.conf (not cape.conf).
- name: Set resultserver IP in cuckoo.conf
  community.general.ini_file:
    path: "{{ cape_install_dir }}/conf/cuckoo.conf"
    section: resultserver
    option: ip
    value: "{{ cape_result_ip }}"
    mode: "0640"

- name: Set resultserver IP in cape.conf
  community.general.ini_file:
    path: "{{ cape_install_dir }}/conf/cape.conf"
    section: resultserver
    option: ip
    value: "{{ cape_result_ip }}"
    mode: "0640"

# api.conf [api] url is the display URL shown in the web UI — not the bind address.
# Set it to the WireGuard address so Cape links and callbacks use the correct host.
- name: Set Cape API display URL to WireGuard interface
  community.general.ini_file:
    path: "{{ cape_install_dir }}/conf/api.conf"
    section: api
    option: url
    value: "http://{{ wireguard_address | ansible.utils.ipaddr('address') }}:{{ cape_api_port }}"
    mode: "0640"

# The actual bind address for the Cape web/API server is controlled by the
# ExecStart line in cape-web.service, which defaults to 0.0.0.0:8000 (all
# interfaces). Replace it with the WireGuard IP so the API is never reachable
# on eth0 — security constraint from SECURITY_CONSTRAINTS.md.
- name: Restrict cape-web to WireGuard interface
  ansible.builtin.lineinfile:
    path: /lib/systemd/system/cape-web.service
    regexp: '(ExecStart=.*runserver_plus\s+)\S+(:\d+.*)'
    line: "\\g<1>{{ wireguard_address | ansible.utils.ipaddr('address') }}\\g<2>"
    backrefs: true
  # backrefs: true — only modifies when the regex matches. If Cape changes the
  # unit file format and the regex no longer matches, the task is skipped (no
  # change) rather than appending a second ExecStart line which systemd rejects.
  # If this task is skipped unexpectedly, the next Ansible run will surface it
  # as a changed=0 on a task that should always change on first provision.

# API key authentication — prevents unauthenticated sample submission
- name: Set Cape API key
  community.general.ini_file:
    path: "{{ cape_install_dir }}/conf/api.conf"
    section: api
    option: api_token
    value: "{{ cape_secret.api_key }}"
    mode: "0640"
  no_log: true

# KVM is the only supported machinery for bare metal analysis
- name: Set Cape machinery to kvm
  community.general.ini_file:
    path: "{{ cape_install_dir }}/conf/cape.conf"
    section: cuckoo
    option: machinery
    value: kvm
    mode: "0640"

# KVM machinery config — use the detonation bridge
- name: Set KVM interface to detonation bridge
  community.general.ini_file:
    path: "{{ cape_install_dir }}/conf/kvm.conf"
    section: kvm
    option: interface
    value: "{{ cape_interface }}"
    mode: "0640"

# -------------------------------------------------------------------------
# Enable Cape services
# -------------------------------------------------------------------------

- name: Reload systemd after cape2.sh installs unit files
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start Cape services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - cape
    - cape-web
    - cape-processor

# -------------------------------------------------------------------------
# routing.conf — network simulation via INetSim (ADR-011)
# Tells Cape to route all guest traffic to INetSim on the detonation
# bridge gateway rather than passing through to the internet.
# -------------------------------------------------------------------------

- name: Deploy routing.conf
  ansible.builtin.template:
    src: routing.conf.j2
    dest: "{{ cape_install_dir }}/conf/routing.conf"
    owner: "{{ cape_user }}"
    group: "{{ cape_user }}"
    mode: "0640"
  notify: Restart Cape services

# -------------------------------------------------------------------------
# kvm.conf — machine list and per-machine stanzas (ADR-013)
# Two machines: clean (base Win10 snapshot) and office (LibreOffice snapshot).
# Tag "office" routes Office document samples to the office machine.
# -------------------------------------------------------------------------

- name: Set Cape machine list in kvm.conf
  community.general.ini_file:
    path: "{{ cape_install_dir }}/conf/kvm.conf"
    section: kvm
    option: machines
    value: "{{ cape_guests | map(attribute='name') | join(',') }}"
    mode: "0640"
  notify: Restart Cape services

- name: Configure kvm.conf machine stanzas
  community.general.ini_file:
    path: "{{ cape_install_dir }}/conf/kvm.conf"
    section: "{{ item.0.name }}"
    option: "{{ item.1.key }}"
    value: "{{ item.1.value }}"
    mode: "0640"
  loop: "{{ cape_guests | subelements('conf_options') }}"
  loop_control:
    label: "[{{ item.0.name }}] {{ item.1.key }}"
  notify: Restart Cape services

# -------------------------------------------------------------------------
# Guest VM libvirt domain definitions
# Renders guest-domain.xml.j2 for each entry in cape_guests, writes it to
# a temp file, and calls virsh define. The domain is redefined on every
# Ansible run so CPU/memory/disk changes are always applied.
# Snapshots are NOT managed here — the operator takes snapshots manually
# after verifying the guest image is ready. See docs/STATUS.md for the
# snapshot workflow.
# -------------------------------------------------------------------------

- name: Ensure guest image directory exists
  ansible.builtin.file:
    path: "{{ cape_guest_image_dir }}"
    state: directory
    owner: "{{ cape_user }}"
    group: "{{ cape_user }}"
    mode: "0755"

- name: Set guest image ownership for libvirt access
  ansible.builtin.shell: chown libvirt-qemu:kvm {{ cape_guest_image_dir }}/windows11-*.qcow2
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false

- name: Ensure OVMF nvram directory exists
  ansible.builtin.file:
    path: /var/lib/libvirt/qemu/nvram
    state: directory
    owner: libvirt-qemu
    group: kvm
    mode: "0755"

- name: Deploy guest libvirt domain XML
  ansible.builtin.template:
    src: guest-domain.xml.j2
    dest: "/tmp/cape-guest-{{ item.name }}.xml"
    mode: "0600"
  loop: "{{ cape_guests }}"
  loop_control:
    label: "{{ item.name }}"

- name: Define guest libvirt domains (virsh define)
  ansible.builtin.command:
    cmd: virsh define /tmp/cape-guest-{{ item.name }}.xml
  loop: "{{ cape_guests }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
  # virsh define is idempotent — it silently replaces an existing domain with
  # no meaningful distinction between "created" and "updated" in its output.
  # changed_when: false avoids spurious changed counts on re-runs.

- name: Remove temporary domain XML files
  ansible.builtin.file:
    path: "/tmp/cape-guest-{{ item.name }}.xml"
    state: absent
  loop: "{{ cape_guests }}"
  loop_control:
    label: "{{ item.name }}"
