---
# =============================================================================
# roles/networking/tasks/main.yml
# Creates the isolated detonation bridge network and applies iptables
# air-gap rules per SECURITY_CONSTRAINTS.md:
#
#   virbr-det → eth0  DROP  (no VM internet egress)
#   virbr-det → wg0   DROP  (no VM access to management VPN)
#
# libvirt isolated networks (no <forward> element) block external routing
# by default. Explicit iptables rules are belt-and-suspenders — they survive
# libvirt rule flushes and make the constraint auditable with `iptables -L`.
#
# Author: Christopher Shaiman
# License: Apache 2.0
# =============================================================================

- name: Install iptables-persistent (saves rules across reboots)
  ansible.builtin.apt:
    name:
      - iptables-persistent
      - netfilter-persistent
    state: present
    update_cache: false

# -------------------------------------------------------------------------
# Detonation bridge — libvirt isolated network
# -------------------------------------------------------------------------

- name: Copy detonation network XML definition
  ansible.builtin.template:
    src: detonation-network.xml.j2
    dest: /tmp/detonation-network.xml
    mode: "0644"

- name: Check if detonation libvirt network is defined
  ansible.builtin.command: virsh net-info detonation
  register: virsh_detonation_info
  changed_when: false
  failed_when: false

- name: Define detonation libvirt network
  ansible.builtin.command: virsh net-define /tmp/detonation-network.xml
  when: virsh_detonation_info.rc != 0

- name: Start detonation libvirt network
  ansible.builtin.command: virsh net-start detonation
  when: >
    virsh_detonation_info.rc != 0 or
    'Active:         yes' not in virsh_detonation_info.stdout

- name: Set detonation network to autostart
  ansible.builtin.command: virsh net-autostart detonation
  when: >
    virsh_detonation_info.rc != 0 or
    'Autostart:      yes' not in virsh_detonation_info.stdout

- name: Remove temp network XML
  ansible.builtin.file:
    path: /tmp/detonation-network.xml
    state: absent

# -------------------------------------------------------------------------
# iptables air-gap rules (belt-and-suspenders on top of libvirt isolation)
# Inserted at the top of FORWARD chain so they run before any ACCEPT rules
# that libvirt may add. Use -C to check idempotently before inserting.
# -------------------------------------------------------------------------

- name: Check air-gap rule — virbr-det → eth0
  ansible.builtin.command: >
    iptables -C FORWARD -i {{ detonation_bridge }} -o {{ management_interface }} -j DROP
  register: rule_eth0_check
  changed_when: false
  failed_when: false

- name: Insert air-gap rule — virbr-det → eth0 (no VM internet egress)
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ detonation_bridge }}"
    out_interface: "{{ management_interface }}"
    jump: DROP
    action: insert
    rule_num: 1
    comment: "Cape detonation air-gap: no VM internet egress"
  when: rule_eth0_check.rc != 0

- name: Check air-gap rule — virbr-det → wg0
  ansible.builtin.command: >
    iptables -C FORWARD -i {{ detonation_bridge }} -o wg0 -j DROP
  register: rule_wg0_check
  changed_when: false
  failed_when: false

- name: Insert air-gap rule — virbr-det → wg0 (no VM access to management VPN)
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: "{{ detonation_bridge }}"
    out_interface: wg0
    jump: DROP
    action: insert
    rule_num: 2
    comment: "Cape detonation air-gap: no VM access to management VPN"
  when: rule_wg0_check.rc != 0

- name: Enable IP forwarding (required for libvirt bridge DHCP and resultserver)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    sysctl_file: /etc/sysctl.d/90-ipforward.conf
    reload: true

# -------------------------------------------------------------------------
# iptables INPUT rules — allow guest VMs to reach host services on virbr-det
# -------------------------------------------------------------------------
# Guests on the detonation bridge (virbr-det) need to reach:
#   - INetSim: DNS (53), HTTP (80), HTTPS (443), SMTP (25), FTP (21)
#   - Cape resultserver: port {{ cape_resultserver_port }}
#
# Without these ACCEPT rules, iptables may drop inbound packets on the
# INPUT chain if the hardening role or a future policy tightens the default.
# Using -C (check) before inserting ensures idempotency.
#
# DNS gets both UDP and TCP rules: UDP for standard queries, TCP for large
# responses and zone transfers (INetSim handles both).

- name: "Check INPUT rule — virbr-det DNS UDP (53)"
  ansible.builtin.command: >
    iptables -C INPUT -i {{ detonation_bridge }} -p udp --dport 53 -j ACCEPT
  register: _inp_dns_udp
  changed_when: false
  failed_when: false

- name: "Insert INPUT rule — virbr-det DNS UDP (INetSim)"
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: "{{ detonation_bridge }}"
    protocol: udp
    destination_port: "53"
    jump: ACCEPT
    action: insert
    rule_num: 1
    comment: "INetSim: guest DNS (UDP)"
  when: _inp_dns_udp.rc != 0

- name: "Check INPUT rule — virbr-det DNS TCP (53)"
  ansible.builtin.command: >
    iptables -C INPUT -i {{ detonation_bridge }} -p tcp --dport 53 -j ACCEPT
  register: _inp_dns_tcp
  changed_when: false
  failed_when: false

- name: "Insert INPUT rule — virbr-det DNS TCP (INetSim)"
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: "{{ detonation_bridge }}"
    protocol: tcp
    destination_port: "53"
    jump: ACCEPT
    action: insert
    rule_num: 2
    comment: "INetSim: guest DNS (TCP)"
  when: _inp_dns_tcp.rc != 0

- name: "Check INPUT rule — virbr-det HTTP (80)"
  ansible.builtin.command: >
    iptables -C INPUT -i {{ detonation_bridge }} -p tcp --dport 80 -j ACCEPT
  register: _inp_http
  changed_when: false
  failed_when: false

- name: "Insert INPUT rule — virbr-det HTTP (INetSim)"
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: "{{ detonation_bridge }}"
    protocol: tcp
    destination_port: "80"
    jump: ACCEPT
    action: insert
    rule_num: 3
    comment: "INetSim: guest HTTP"
  when: _inp_http.rc != 0

- name: "Check INPUT rule — virbr-det HTTPS (443)"
  ansible.builtin.command: >
    iptables -C INPUT -i {{ detonation_bridge }} -p tcp --dport 443 -j ACCEPT
  register: _inp_https
  changed_when: false
  failed_when: false

- name: "Insert INPUT rule — virbr-det HTTPS (INetSim)"
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: "{{ detonation_bridge }}"
    protocol: tcp
    destination_port: "443"
    jump: ACCEPT
    action: insert
    rule_num: 4
    comment: "INetSim: guest HTTPS"
  when: _inp_https.rc != 0

- name: "Check INPUT rule — virbr-det SMTP (25)"
  ansible.builtin.command: >
    iptables -C INPUT -i {{ detonation_bridge }} -p tcp --dport 25 -j ACCEPT
  register: _inp_smtp
  changed_when: false
  failed_when: false

- name: "Insert INPUT rule — virbr-det SMTP (INetSim)"
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: "{{ detonation_bridge }}"
    protocol: tcp
    destination_port: "25"
    jump: ACCEPT
    action: insert
    rule_num: 5
    comment: "INetSim: guest SMTP"
  when: _inp_smtp.rc != 0

- name: "Check INPUT rule — virbr-det FTP (21)"
  ansible.builtin.command: >
    iptables -C INPUT -i {{ detonation_bridge }} -p tcp --dport 21 -j ACCEPT
  register: _inp_ftp
  changed_when: false
  failed_when: false

- name: "Insert INPUT rule — virbr-det FTP (INetSim)"
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: "{{ detonation_bridge }}"
    protocol: tcp
    destination_port: "21"
    jump: ACCEPT
    action: insert
    rule_num: 6
    comment: "INetSim: guest FTP"
  when: _inp_ftp.rc != 0

- name: "Check INPUT rule — virbr-det Cape resultserver ({{ cape_resultserver_port }})"
  ansible.builtin.command: >
    iptables -C INPUT -i {{ detonation_bridge }} -p tcp --dport {{ cape_resultserver_port }} -j ACCEPT
  register: _inp_resultserver
  changed_when: false
  failed_when: false

- name: "Insert INPUT rule — virbr-det Cape resultserver"
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: "{{ detonation_bridge }}"
    protocol: tcp
    destination_port: "{{ cape_resultserver_port }}"
    jump: ACCEPT
    action: insert
    rule_num: 7
    comment: "Cape: guest resultserver"
  when: _inp_resultserver.rc != 0

- name: Save iptables rules (persist across reboots)
  ansible.builtin.command: netfilter-persistent save
  changed_when: true
