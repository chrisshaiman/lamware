---
# =============================================================================
# site.yml — Main Ansible playbook
# Runs all roles against the sandbox host in order.
# Each role is idempotent — safe to re-run after config changes.
#
# Author: Christopher Shaiman
# License: Apache 2.0
# =============================================================================

- name: Configure malware sandbox host
  hosts: sandbox
  become: true
  gather_facts: true

  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Validate required variables are populated
      ansible.builtin.assert:
        that:
          - s3_bucket_samples | length > 0
          - s3_bucket_reports | length > 0
          - secret_arn_baremetal | length > 0
          - secret_arn_cape | length > 0
          - wireguard_peer_pubkey | length > 0
        fail_msg: |
          One or more required variables are empty. Populate ansible/vars/main.yml:
            s3_bucket_samples    — terraform -chdir=aws/envs/prod output -raw samples_bucket_name
            s3_bucket_reports    — terraform -chdir=aws/envs/prod output -raw reports_bucket_name
            secret_arn_baremetal  — terraform -chdir=aws/envs/prod output -raw baremetal_agent_secret_arn
            secret_arn_cape      — ARN of the Cape API key secret in Secrets Manager
            wireguard_peer_pubkey — your laptop's WireGuard public key (wg pubkey < ~/wg-private.key)

  roles:
    # 1. OS hardening — CIS-aligned baseline (konstruktoid)
    - role: hardening

    # 2. Networking — detonation bridge + iptables air-gap + INetSim INPUT rules
    - role: networking

    # 3. INetSim — host-side network simulator for guest VM traffic (ADR-011)
    #    Must run after networking (needs virbr-det bridge IP to exist).
    #    Must run before cape (cape routing.conf references inetsim_server).
    - role: inetsim

    # 4. KVM/QEMU/libvirt
    - role: kvm

    # 4. WireGuard VPN
    - role: wireguard

    # 5. CAPEv2 — runs kvm-qemu.sh (DSDT patching) then cape2.sh
    - role: cape

    # 6. SQS agent — polls SQS, submits to Cape, syncs reports to S3
    #    (absorbs the previously planned s3-sync role — see ADR-003)
    - role: sqs-agent

    # 7. Sample feeder — interactive CLI for MalwareBazaar sample ingestion (ADR-015)
    - role: sample-feeder
      tags: [sample-feeder]
