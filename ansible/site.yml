---
# =============================================================================
# site.yml — Main Ansible playbook
# Runs all roles against the sandbox host in order.
# Each role is idempotent — safe to re-run after config changes.
#
# Author: Christopher Shaiman
# License: Apache 2.0
# =============================================================================

- name: Configure malware sandbox host
  hosts: sandbox
  become: true
  gather_facts: true

  vars_files:
    - vars/main.yml
    - vars/secrets.yml

  pre_tasks:
    - name: Validate required variables are populated
      ansible.builtin.assert:
        that:
          - wireguard_peer_pubkey | length > 0
          - cape_api_key | length > 0
          - bazaar_auth_key | length > 0
        fail_msg: |
          One or more required variables are empty:
            wireguard_peer_pubkey — your laptop's WireGuard public key (wg pubkey < ~/wg-private.key)
            cape_api_key          — Cape API token (ansible/vars/secrets.yml)
            bazaar_auth_key       — MalwareBazaar auth key (ansible/vars/secrets.yml)

  roles:
    # 1. OS hardening — CIS-aligned baseline (konstruktoid)
    - role: hardening
      tags: [hardening]

    # 2. KVM/QEMU/libvirt — must run before networking (virsh needed for bridge)
    - role: kvm
      tags: [kvm]

    # 3. Networking — detonation bridge + iptables air-gap + INetSim INPUT rules
    #    Requires libvirt (virsh) from KVM role.
    - role: networking
      tags: [networking]

    # 4. INetSim — host-side network simulator for guest VM traffic (ADR-011)
    #    Must run after networking (needs virbr-det bridge IP to exist).
    #    Must run before cape (cape routing.conf references inetsim_server).
    - role: inetsim
      tags: [inetsim]

    # 5. WireGuard VPN
    - role: wireguard
      tags: [wireguard]

    # 6. DSDT-patched QEMU binary + cape user/repo setup
    - role: qemu-patched
      tags: [qemu-patched]

    # 7. MongoDB 8.0 — standalone, required by Cape
    - role: mongodb
      tags: [mongodb]

    # 8. CAPEv2 — cape2.sh installer + config + services
    - role: cape
      tags: [cape]

    # 9. Guest VMs — libvirt domains + snapshots
    - role: cape-guests
      tags: [cape-guests]

    # 10. Podman — container runtime for analysis tool stages
    - role: podman
      tags: [podman]

    # 11. Triage — containerized YARA/ssdeep/FLOSS analysis
    - role: triage
      tags: [triage]

    # 12. Pipeline orchestrator — chains triage → Cape → Volatility → Ghidra
    - role: pipeline
      tags: [pipeline]

    # 13. Sample feeder — interactive CLI for MalwareBazaar sample ingestion (ADR-015)
    - role: sample-feeder
      tags: [sample-feeder]
